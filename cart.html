<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Made By Canadians</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <div class="cart-container">
        <div class="cart-header">
            <h1><img src="images/logo.png" width="80px">Made By Canadians</h1>
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
                Back to Shopping
            </button>
        </div>

        <div class="cart-content">
            <div class="cart-items">
            </div>

            <div class="order-summary">
                <h2 class="summary-title">Order Summary</h2>
                <div class="summary-item">
                    <span>Subtotal (3 items):</span>
                    <span class="subtotal">CA$2,589.97</span>
                </div>
                <div class="summary-item">
                    <span>Shipping:</span>
                    <span class="shipping">CA$130.00</span>
                </div>
                <div class="summary-item total">
                    <strong>Total:</strong>
                    <strong class="total-price">CA$2,719.97</strong>
                </div>

                <div class="promo-section">
                    <input type="text" class="promo-input" placeholder="Enter promo code">
                    <button class="apply-btn">Apply Code</button>
                </div>

              <a href="payment_checkout.html"><button class="checkout-btn">Secure Checkout <i class="fas fa-lock"></i></button></a> 
                
                <div class="payment-methods">
                    <img src="images/payment_method.jpg" alt="Payment methods">
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Message here</span>
    </div>

    <script>
        let discount = 0;
        const shippingCharge = 130; 
    
        function updateCart() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            const container = document.querySelector('.cart-items');
            container.innerHTML = '';
    
            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Your cart is empty</h2>
                        <p>Continue shopping to add items to your cart</p>
                    </div>
                `;
                updateSummary(0);
                return;
            }
    
            cartItems.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.className = 'cart-item';
                const priceValue = parseFloat(item.price.replace(/[^0-9.]/g, ''));
    
                itemElement.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="item-image">
                    <div class="item-details">
                        <h3 class="item-title">${item.name}</h3>
                        <p class="item-price">${item.price}</p>
                        <div class="quantity-controls">
                            <button class="quantity-btn minus" data-index="${index}">-</button>
                            <span class="quantity">1</span>
                            <button class="quantity-btn plus" data-index="${index}">+</button>
                        </div>
                        <p class="added-time"><small>Added: ${item.time}</small></p>
                    </div>
                    <button class="remove-btn" data-index="${index}">
                        <i class="fas fa-trash"></i> Remove
                    </button>
                `;
    
                container.appendChild(itemElement);
            });
    
            calculateTotal();
            addEventListeners();
        }
    
        function calculateTotal() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            let subtotal = 0;
            
            cartItems.forEach(item => {
                const priceValue = parseFloat(item.price.replace(/[^0-9.]/g, ''));
                subtotal += priceValue;
            });
    
            const total = (subtotal + shippingCharge) * (1 - discount); 
    
            updateSummary(subtotal, total);
        }
    
        function updateSummary(subtotal, total) {
            document.querySelector('.subtotal').textContent = `CA$${subtotal.toFixed(2)}`;
            document.querySelector('.shipping').textContent = `CA$${shippingCharge.toFixed(2)}`; 
            document.querySelector('.total-price').textContent = `CA$${total.toFixed(2)}`;
        }
    
        function addEventListeners() {
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = btn.dataset.index;
                    if (confirm('Are you sure you want to remove this item?')) {
                        let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
                        cartItems.splice(index, 1);
                        localStorage.setItem('cartItems', JSON.stringify(cartItems));
                        updateCart();
                    }
                });
            });
    
            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    calculateTotal();
                });
            });
    
            document.querySelector('.apply-btn').addEventListener('click', applyPromo);
        }
    
        function applyPromo() {
            const promoCode = document.querySelector('.promo-input').value;
            if (promoCode === 'DISCOUNT10') {
                discount = 0.1;
                calculateTotal();
                alert('Promo code applied successfully!');
            } else {
                alert('Invalid promo code');
            }
        }
    
        document.addEventListener('DOMContentLoaded', updateCart);
    </script>
</body>
</html>
