<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .cart-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .cart-header h1 {
            font-size: 2.5rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cart-header h1 i {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.1);
            padding: 1rem;
            border-radius: 50%;
        }

        .back-btn {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            background: var(--secondary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cart-content {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
            position: relative;
        }

        .cart-items {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 1rem;
            background: white;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .cart-item:hover {
            transform: translateY(-3px);
        }

        .item-image {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin-right: 2rem;
            border-radius: 0.75rem;
            background: #f8fafc;
            padding: 1rem;
        }

        .item-details {
            flex-grow: 1;
        }

        .item-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            background: none;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--primary);
            font-weight: 600;
        }

        .quantity-btn:hover {
            background: var(--primary);
            color: white;
        }

        .quantity {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .remove-btn {
            background: none;
            color: #ef4444;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .remove-btn:hover {
            background: #fee2e2;
        }

        .order-summary {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding: 0.75rem 0;
        }

        .summary-item.total {
            border-top: 2px solid #e2e8f0;
            padding-top: 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .promo-section {
            margin: 2rem 0;
            position: relative;
        }

        .promo-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .promo-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .apply-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin-top: 1rem;
        }

        .apply-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .checkout-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1.5rem;
            border-radius: 0.75rem;
            width: 100%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .empty-cart {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .empty-cart i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .empty-cart h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--dark);
        }

        .empty-cart p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        @media (max-width: 1024px) {
            .cart-content {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: relative;
                top: 0;
            }
        }

        @media (max-width: 768px) {
            .cart-container {
                padding: 2rem 1rem;
            }

            .cart-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.5rem;
            }

            .item-image {
                width: 100%;
                height: auto;
                margin-right: 0;
                margin-bottom: 1rem;
            }

            .quantity-controls {
                margin-top: 1rem;
            }
        }

        /* Animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cart-item {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="cart-container">
        <div class="cart-header">
            <h1><img src="images/logo.png" width="80px"></i>Made By Canadians</h1>
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
                Back to Shopping
            </button>
        </div>

        <div class="cart-content">
            <div class="cart-items">
                <!-- Cart items will be populated here -->
            </div>

            <div class="order-summary">
                <h2 class="summary-title">Order Summary</h2>
                <div class="summary-item">
                    <span>Subtotal (3 items):</span>
                    <span class="subtotal">CA$2,589.97</span>
                </div>
                <div class="summary-item">
                    <span>Shipping:</span>
                    <span class="shipping">CA$130.00</span>
                </div>
                <div class="summary-item total">
                    <strong>Total:</strong>
                    <strong class="total-price">CA$2,719.97</strong>
                </div>

                <div class="promo-section">
                    <input type="text" class="promo-input" placeholder="Enter promo code">
                    <button class="apply-btn">Apply Code</button>
                </div>

                <button class="checkout-btn">Secure Checkout <i class="fas fa-lock"></i></button>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <img src="images/payment_method.jpg" alt="Payment methods" style="width: 100%; opacity: 0.7;">
                </div>
            </div>
        </div>
    </div>

    <script>
        let discount = 0;
        const shippingCharge = 130; // Fixed shipping charge
    
        function updateCart() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            const container = document.querySelector('.cart-items');
            container.innerHTML = '';
    
            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Your cart is empty</h2>
                        <p>Continue shopping to add items to your cart</p>
                    </div>
                `;
                updateSummary(0);
                return;
            }
    
            cartItems.forEach((item, index) => {
                const itemElement = document.createElement('div');
                itemElement.className = 'cart-item';
                const priceValue = parseFloat(item.price.replace(/[^0-9.]/g, ''));
    
                itemElement.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="item-image">
                    <div class="item-details">
                        <h3 class="item-title">${item.name}</h3>
                        <p class="item-price">${item.price}</p>
                        <div class="quantity-controls">
                            <button class="quantity-btn minus" data-index="${index}">-</button>
                            <span class="quantity">1</span>
                            <button class="quantity-btn plus" data-index="${index}">+</button>
                        </div>
                        <p class="added-time"><small>Added: ${item.time}</small></p>
                    </div>
                    <button class="remove-btn" data-index="${index}">
                        <i class="fas fa-trash"></i> Remove
                    </button>
                `;
    
                container.appendChild(itemElement);
            });
    
            calculateTotal();
            addEventListeners();
        }
    
        function calculateTotal() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            let subtotal = 0;
            
            cartItems.forEach(item => {
                const priceValue = parseFloat(item.price.replace(/[^0-9.]/g, ''));
                subtotal += priceValue;
            });
    
            const total = (subtotal + shippingCharge) * (1 - discount); // Add fixed shipping charge
    
            updateSummary(subtotal, total);
        }
    
        function updateSummary(subtotal, total) {
            document.querySelector('.subtotal').textContent = `CA$${subtotal.toFixed(2)}`;
            document.querySelector('.shipping').textContent = `CA$${shippingCharge.toFixed(2)}`; // Fixed shipping charge
            document.querySelector('.total-price').textContent = `CA$${total.toFixed(2)}`;
        }
    
        function addEventListeners() {
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = btn.dataset.index;
                    if (confirm('Are you sure you want to remove this item?')) {
                        let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
                        cartItems.splice(index, 1);
                        localStorage.setItem('cartItems', JSON.stringify(cartItems));
                        updateCart();
                    }
                });
            });
    
            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // Implement quantity change logic here
                    calculateTotal();
                });
            });
    
            document.querySelector('.apply-btn').addEventListener('click', applyPromo);
        }
    
        function applyPromo() {
            const promoCode = document.querySelector('.promo-input').value;
            // Add your promo code logic here
            if (promoCode === 'DISCOUNT10') {
                discount = 0.1;
                calculateTotal();
                alert('Promo code applied successfully!');
            } else {
                alert('Invalid promo code');
            }
        }
    
        document.addEventListener('DOMContentLoaded', updateCart);
    </script>

</body>
</html>
